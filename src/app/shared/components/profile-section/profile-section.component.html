<div class="profile">
  <p class="name">{{ username() }}</p>
  <p class="role">{{ role() }}</p>
  @if (showProfileLink()) {
    <div class="profile-actions">
      <a href="#" (click)="emitProfileRequested($event)">Open profile</a>
      <a href="#" (click)="emitPasswordChangeRequested($event)">Change password</a>
    </div>
  }
</div>
