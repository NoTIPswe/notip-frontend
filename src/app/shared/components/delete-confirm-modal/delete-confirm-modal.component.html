<app-modal-layer [open]="open()">
  <section class="delete-modal">
    <h3>{{ title() }}</h3>
    <p>{{ message() }}</p>

    <div class="actions">
      <button type="button" class="ghost" (click)="onCancel()" [disabled]="busy()">Cancel</button>
      <button type="button" class="danger" (click)="onConfirm()" [disabled]="busy()">
        Confirm
      </button>
    </div>
  </section>
</app-modal-layer>
