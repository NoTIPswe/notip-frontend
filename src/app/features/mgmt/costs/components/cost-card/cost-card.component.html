<section class="cost-card">
  <h3>Consumi Tenant</h3>

  @if (isLoading()) {
    <p class="meta">Caricamento costi...</p>
  }

  @if (costs()) {
    <dl>
      <div>
        <dt>Storage</dt>
        <dd>{{ costs()!.storageGb.toFixed(2) }} GB</dd>
      </div>
      <div>
        <dt>Bandwidth</dt>
        <dd>{{ costs()!.bandwidthGb.toFixed(2) }} GB</dd>
      </div>
      <div>
        <dt>Totale</dt>
        <dd>{{ totalGb().toFixed(2) }} GB</dd>
      </div>
    </dl>
  }
</section>
