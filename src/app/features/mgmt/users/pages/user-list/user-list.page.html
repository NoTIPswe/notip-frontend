<section class="user-list-page">
  <div class="header-row">
    <h2>User Management</h2>
    @if (!(showCreateForm() || editingUser())) {
      <button type="button" class="create-toggle" (click)="openCreateUserForm()">+ New user</button>
    }
  </div>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (infoMessage()) {
    <p class="info">{{ infoMessage() }}</p>
  }

  <app-user-table
    [users]="users()"
    [isLoading]="isLoading()"
    [selectedUserId]="editingUserId()"
    (editRequested)="requestEdit($event)"
    (deleteRequested)="requestDelete($event)"
  ></app-user-table>

  @if (showCreateForm() || editingUser()) {
    <app-modal-layer [open]="true">
      <app-user-form
        [editUser]="editingUser()"
        [isSaving]="isSaving()"
        (createRequested)="createUser($event)"
        (updateRequested)="updateUser($event)"
        (cancelRequested)="cancelEdit()"
      ></app-user-form>
    </app-modal-layer>
  }

  <app-delete-confirm-modal
    [open]="!!deletingUserId()"
    [title]="'Delete user'"
    [message]="'Do you confirm deleting the selected user?'"
    [busy]="isSaving()"
    (confirmed)="confirmDelete()"
    (cancelled)="cancelDelete()"
  ></app-delete-confirm-modal>
</section>
