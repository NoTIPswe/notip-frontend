<section class="user-form">
  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (editUser()) {
    <h3>Edit user</h3>
    <form (submit)="update($event, updateUsername.value, updateEmail.value, updateRole.value)">
      <label>
        Username
        <input #updateUsername type="text" [value]="editUser()!.username" required minlength="2" />
      </label>

      <label>
        Email
        <input #updateEmail type="email" [value]="editUser()!.email" required />
      </label>

      <label>
        Role
        <select #updateRole [value]="editUser()!.role">
          <option [value]="UserRole.tenant_user">tenant_user</option>
          <option [value]="UserRole.tenant_admin">tenant_admin</option>
        </select>
      </label>

      <div class="actions">
        <button type="submit" [disabled]="isSaving()">Save</button>
        <button type="button" class="ghost" (click)="cancel()" [disabled]="isSaving()">
          Cancel
        </button>
      </div>
    </form>
  } @else {
    <h3>Create user</h3>
    <form
      (submit)="
        create(
          $event,
          createUsername.value,
          createEmail.value,
          createRole.value,
          createPassword.value
        )
      "
    >
      <label>
        Username
        <input #createUsername type="text" required minlength="2" />
      </label>

      <label>
        Email
        <input #createEmail type="email" required />
      </label>

      <label>
        Role
        <select #createRole>
          <option [value]="UserRole.tenant_user">tenant_user</option>
          <option [value]="UserRole.tenant_admin">tenant_admin</option>
        </select>
      </label>

      <label>
        Password
        <input #createPassword type="password" required minlength="8" />
      </label>

      <div class="actions">
        <button type="submit" [disabled]="isSaving()">Create</button>
        <button type="button" class="ghost" (click)="cancel()" [disabled]="isSaving()">
          Cancel
        </button>
      </div>
    </form>
  }
</section>
