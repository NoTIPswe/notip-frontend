<section class="audit-log-page">
  <div class="page-header">
    <h2>Audit Log</h2>
    <button
      type="button"
      class="export-button"
      [disabled]="!canExportLogs()"
      (click)="onExportLogs()"
    >
      @if (isExporting()) {
        Exporting...
      } @else {
        Export CSV
      }
    </button>
  </div>

  <app-audit-filter-panel
    [from]="from()"
    [to]="to()"
    [userIds]="userIds()"
    [actions]="actions()"
    [userIdOptions]="userIdOptions()"
    [actionOptions]="actionOptions()"
    [isLoading]="isLoading()"
    (filterSubmitted)="applyFilters($event)"
    (resetRequested)="resetFilters()"
  ></app-audit-filter-panel>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  <app-audit-log-table [logs]="logs()" [isLoading]="isLoading()"></app-audit-log-table>
</section>
