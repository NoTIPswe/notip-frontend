<section class="audit-filter-panel">
  <h3>Audit Filters</h3>

  <form (submit)="submit($event, fromInput.value, toInput.value)">
    <label>
      From
      <input #fromInput type="datetime-local" [value]="from()" />
    </label>

    <label>
      To
      <input #toInput type="datetime-local" [value]="to()" />
    </label>

    <div class="field">
      <span>User IDs</span>
      <app-multi-select-dropdown
        [options]="userIdOptions()"
        [selected]="selectedUserIds()"
        [placeholder]="'Select user'"
        [searchPlaceholder]="'Search user...'"
        [disabled]="isLoading()"
        (selectedChange)="onUserIdsChanged($event)"
      ></app-multi-select-dropdown>
    </div>

    <div class="field">
      <span>Actions</span>
      <app-multi-select-dropdown
        [options]="actionOptions()"
        [selected]="selectedActions()"
        [placeholder]="'Select action'"
        [searchPlaceholder]="'Search action...'"
        [disabled]="isLoading()"
        (selectedChange)="onActionsChanged($event)"
      ></app-multi-select-dropdown>
    </div>

    <div class="actions-row">
      <button type="submit" [disabled]="isLoading()">Apply</button>
      <button type="button" class="ghost" (click)="reset()" [disabled]="isLoading()">Reset</button>
    </div>
  </form>
</section>
