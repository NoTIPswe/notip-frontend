<section class="threshold-form">
  <h3>New Threshold</h3>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  <div class="mode-selector" role="tablist" aria-label="Threshold type selector">
    <button
      type="button"
      class="mode-btn"
      [class.active]="selectedMode() === 'type'"
      [disabled]="isSaving() || sensorTypes().length === 0"
      (click)="selectMode('type')"
    >
      By Sensor Type
    </button>

    <button
      type="button"
      class="mode-btn"
      [class.active]="selectedMode() === 'sensor'"
      [disabled]="isSaving() || sensorIds().length === 0"
      (click)="selectMode('sensor')"
    >
      By Sensor ID
    </button>
  </div>

  @if (selectedMode() === 'type') {
    <form (submit)="submitType($event, typeSensorType.value, typeMin.value, typeMax.value)">
      <h4>By Sensor Type</h4>
      <label>
        Sensor Type
        <select #typeSensorType required>
          <option value="">Select sensor type</option>
          @for (sensorType of sensorTypes(); track sensorType) {
            <option [value]="sensorType">{{ sensorType }}</option>
          }
        </select>
      </label>
      <label>
        Min value
        <input #typeMin type="number" step="0.1" />
      </label>
      <label>
        Max value
        <input #typeMax type="number" step="0.1" />
      </label>
      <button type="submit" [disabled]="isSaving() || sensorTypes().length === 0">
        Save type threshold
      </button>
    </form>
  }

  @if (selectedMode() === 'sensor') {
    <form (submit)="submitSensor($event, sensorId.value, sensorMin.value, sensorMax.value)">
      <h4>By Sensor ID</h4>
      <label>
        Sensor ID
        <select #sensorId required>
          <option value="">Select sensor ID</option>
          @for (sensorIdOption of sensorIds(); track sensorIdOption) {
            <option [value]="sensorIdOption">{{ sensorIdOption }}</option>
          }
        </select>
      </label>
      <label>
        Min value
        <input #sensorMin type="number" step="0.1" />
      </label>
      <label>
        Max value
        <input #sensorMax type="number" step="0.1" />
      </label>
      <button type="submit" [disabled]="isSaving() || sensorIds().length === 0">
        Save sensor threshold
      </button>
    </form>
  }

  <div class="actions">
    <button type="button" class="ghost" (click)="cancel()" [disabled]="isSaving()">Cancel</button>
  </div>
</section>
