<section class="threshold-form">
  <h3>Nuova Soglia</h3>

  <form (submit)="submitType($event, typeSensorType.value, typeMin.value, typeMax.value)">
    <h4>Per Sensor Type</h4>
    <label>
      Sensor Type
      <input #typeSensorType type="text" required minlength="2" />
    </label>
    <label>
      Min value
      <input #typeMin type="number" step="0.1" />
    </label>
    <label>
      Max value
      <input #typeMax type="number" step="0.1" />
    </label>
    <button type="submit" [disabled]="isSaving()">Salva type threshold</button>
  </form>

  <form (submit)="submitSensor($event, sensorId.value, sensorMin.value, sensorMax.value)">
    <h4>Per Sensor ID</h4>
    <label>
      Sensor ID
      <input #sensorId type="text" required minlength="2" />
    </label>
    <label>
      Min value
      <input #sensorMin type="number" step="0.1" />
    </label>
    <label>
      Max value
      <input #sensorMax type="number" step="0.1" />
    </label>
    <button type="submit" [disabled]="isSaving()">Salva sensor threshold</button>
  </form>

  <div class="actions">
    <button type="button" class="ghost" (click)="cancel()" [disabled]="isSaving()">Annulla</button>
  </div>
</section>
