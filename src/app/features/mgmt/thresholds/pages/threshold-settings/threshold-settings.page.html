<section class="threshold-settings-page">
  <div class="header-row">
    <h2>Soglie</h2>
    @if (!showForm()) {
      <button type="button" class="create-toggle" (click)="toggleForm()">+ Nuova soglia</button>
    }
  </div>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (infoMessage()) {
    <p class="info">{{ infoMessage() }}</p>
  }

  @if (!showForm()) {
    <app-threshold-table
      [thresholds]="thresholds()"
      [isLoading]="isLoading()"
      (deleteRequested)="deleteThreshold($event)"
    ></app-threshold-table>
  }

  @if (showForm()) {
    <app-threshold-form
      [isSaving]="isSaving()"
      (typeSubmitted)="saveTypeThreshold($event)"
      (sensorSubmitted)="saveSensorThreshold($event)"
      (cancelRequested)="closeForm()"
    ></app-threshold-form>
  }
</section>
