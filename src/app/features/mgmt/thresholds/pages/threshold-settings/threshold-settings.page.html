<section class="threshold-settings-page">
  <h2>Soglie</h2>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (infoMessage()) {
    <p class="info">{{ infoMessage() }}</p>
  }

  <app-threshold-table
    [thresholds]="thresholds()"
    [isLoading]="isLoading()"
    (deleteRequested)="deleteThreshold($event)"
  ></app-threshold-table>

  <app-threshold-form
    [isSaving]="isSaving()"
    (typeSubmitted)="saveTypeThreshold($event)"
    (sensorSubmitted)="saveSensorThreshold($event)"
  ></app-threshold-form>
</section>
