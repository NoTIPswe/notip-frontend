<section class="gateway-actions">
  <h3>Gateway actions</h3>

  @if (!canManage()) {
    <p class="hint">Insufficient permissions: tenant_admin required.</p>
  }

  <div class="actions">
    @if (showRename()) {
      <button type="button" (click)="onRename()" [disabled]="!canManage() || isBusy()">
        Rename
      </button>
    }
    <button type="button" (click)="onConfigure()" [disabled]="!canManage() || isBusy()">
      Configure
    </button>
    <button type="button" (click)="onFirmware()" [disabled]="!canManage() || isBusy()">
      Firmware
    </button>
    <button type="button" class="danger" (click)="onDelete()" [disabled]="!canManage() || isBusy()">
      Delete
    </button>
  </div>
</section>
