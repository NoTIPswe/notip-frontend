<app-modal-layer [open]="open()">
  <section class="command-modal">
    <div class="header-row">
      <h3>Send command</h3>
      <button type="button" class="ghost" (click)="close()" [disabled]="busy()">Close</button>
    </div>

    @if (mode() === 'config') {
      <form (submit)="submitConfig($event, sendFrequency.value, status.value)">
        <label>
          Send frequency (ms)
          <input
            #sendFrequency
            type="number"
            min="1000"
            step="100"
            [value]="initialSendFrequencyMs() ?? ''"
          />
        </label>

        <label>
          Status
          <select #status [value]="initialStatus() ?? ''">
            <option [value]="cmdStatusOnline">online</option>
            <option [value]="cmdStatusPaused">paused</option>
          </select>
        </label>

        <button type="submit" [disabled]="busy()">Send config</button>
      </form>
    }

    @if (mode() === 'firmware') {
      <form (submit)="submitFirmware($event, version.value, url.value)">
        <label>
          Firmware version
          <input #version type="text" required minlength="2" />
        </label>

        <label>
          Download URL
          <input #url type="url" required />
        </label>

        <button type="submit" [disabled]="busy()">Send firmware</button>
      </form>
    }
  </section>
</app-modal-layer>
