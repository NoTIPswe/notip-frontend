<section class="gateway-list-page">
  <h2>Gateway List</h2>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (isLoading()) {
    <p class="meta">Loading gateways...</p>
  }

  @if (!isLoading() && gateways().length === 0) {
    <p class="meta">No gateways available.</p>
  }

  <div class="cards">
    @for (gateway of gateways(); track gateway.gatewayId) {
      <app-gateway-card
        [gateway]="gateway"
        [selected]="selectedGatewayId() === gateway.gatewayId"
        (selectedGateway)="onGatewaySelected($event)"
      ></app-gateway-card>
    }
  </div>
</section>
