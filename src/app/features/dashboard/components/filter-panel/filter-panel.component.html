<section class="filter-panel">
  <h3>{{ mode() === 'stream' ? 'Stream Filters' : 'Query Filters' }}</h3>

  @if (mode() === 'stream') {
    <form (submit)="applyFilters($event, gatewayIds, sensorTypes, sensorIds)">
      <div class="grid">
        <label>
          Gateway
          <select #gatewayIds multiple size="4">
            @for (gatewayId of gatewayOptions(); track gatewayId) {
              <option
                [value]="gatewayId"
                [selected]="isSelected(gatewayId, defaultFilters().gatewayIds)"
              >
                {{ gatewayId }}
              </option>
            }
          </select>
        </label>

        <label>
          Sensor type
          <select #sensorTypes multiple size="4">
            @for (sensorType of sensorTypeOptions(); track sensorType) {
              <option
                [value]="sensorType"
                [selected]="isSelected(sensorType, defaultFilters().sensorTypes)"
              >
                {{ sensorType }}
              </option>
            }
          </select>
        </label>

        <label>
          Sensors
          <select #sensorIds multiple size="4">
            @for (sensorId of sensorOptions(); track sensorId) {
              <option
                [value]="sensorId"
                [selected]="isSelected(sensorId, defaultFilters().sensorIds)"
              >
                {{ sensorId }}
              </option>
            }
          </select>
        </label>
      </div>

      <p class="hint">Multi-selection: use Ctrl/Cmd + click.</p>

      <div class="actions">
        <button type="submit" class="btn btn-primary">Apply</button>
        <button
          type="button"
          class="btn btn-ghost"
          (click)="clearFilters(gatewayIds, sensorTypes, sensorIds)"
        >
          Clear
        </button>
      </div>
    </form>
  }

  @if (mode() === 'query') {
    <form
      (submit)="
        applyFilters($event, gatewayIds, sensorTypes, sensorIds, fromInput.value, toInput.value)
      "
    >
      <div class="grid">
        <label>
          Gateway
          <select #gatewayIds multiple size="4">
            @for (gatewayId of gatewayOptions(); track gatewayId) {
              <option
                [value]="gatewayId"
                [selected]="isSelected(gatewayId, defaultFilters().gatewayIds)"
              >
                {{ gatewayId }}
              </option>
            }
          </select>
        </label>

        <label>
          Sensor type
          <select #sensorTypes multiple size="4">
            @for (sensorType of sensorTypeOptions(); track sensorType) {
              <option
                [value]="sensorType"
                [selected]="isSelected(sensorType, defaultFilters().sensorTypes)"
              >
                {{ sensorType }}
              </option>
            }
          </select>
        </label>

        <label>
          Sensors
          <select #sensorIds multiple size="4">
            @for (sensorId of sensorOptions(); track sensorId) {
              <option
                [value]="sensorId"
                [selected]="isSelected(sensorId, defaultFilters().sensorIds)"
              >
                {{ sensorId }}
              </option>
            }
          </select>
        </label>

        <label>
          From
          <input
            #fromInput
            type="datetime-local"
            [value]="toLocalDateTimeInput(defaultFilters().from)"
          />
        </label>

        <label>
          To
          <input
            #toInput
            type="datetime-local"
            [value]="toLocalDateTimeInput(defaultFilters().to)"
          />
        </label>
      </div>

      <p class="hint">Multi-selection: use Ctrl/Cmd + click.</p>

      <div class="actions">
        <button type="submit" class="btn btn-primary">Apply</button>
        <button
          type="button"
          class="btn btn-ghost"
          (click)="clearFilters(gatewayIds, sensorTypes, sensorIds, fromInput, toInput)"
        >
          Clear
        </button>
      </div>
    </form>
  }
</section>
