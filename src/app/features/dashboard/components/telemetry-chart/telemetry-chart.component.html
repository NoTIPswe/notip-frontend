<section class="telemetry-chart">
  <div class="chart-header">
    <h3>Trend Sensore</h3>
    @if (uniqueSensorIds().length > 1) {
      <div class="sensor-selector">
        <select [value]="selectedSensorId()" (change)="onSensorSelected($event)">
          @for (id of uniqueSensorIds(); track id) {
            <option [value]="id">{{ id }}</option>
          }
        </select>
      </div>
    }
  </div>

  <div class="chart-container">
    @if (selectedSensorId()) {
      <canvas #chartCanvas></canvas>
    } @else {
      <p class="empty">Nessun sensore disponibile o selezionato.</p>
    }
  </div>

  <p class="meta">Envelope oscurati ricevuti: {{ obfuscatedCount() }}</p>
</section>
