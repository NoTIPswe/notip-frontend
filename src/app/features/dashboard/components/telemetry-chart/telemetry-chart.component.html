<section class="telemetry-chart">
  <div class="chart-header">
    <h3>Sensor Trends</h3>
    @if (uniqueCheckedSensorIds().length > 0) {
      <p class="series-count">{{ uniqueCheckedSensorIds().length }} sensors</p>
    }
  </div>

  <div class="chart-container">
    @if (hasDecryptedMeasures()) {
      <canvas #chartCanvas></canvas>
    } @else {
      <p class="empty">No decrypted sensor data available for the current filters.</p>
    }
  </div>

  <p class="meta">Obfuscated envelopes received: {{ obfuscatedCount() }}</p>
</section>
