<section class="admin-gateway-list">
  <h2>Admin Gateway</h2>

  <form class="filter-row" (submit)="onApplyFilter(tenantFilterInput.value)">
    <label>
      Filtro tenant ID
      <input #tenantFilterInput type="text" [value]="tenantFilter()" placeholder="tenant_123" />
    </label>
    <div class="actions">
      <button type="submit">Applica</button>
      <button type="button" class="ghost" (click)="onResetFilter()">Reset</button>
    </div>
  </form>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (infoMessage()) {
    <p class="info">{{ infoMessage() }}</p>
  }

  <app-admin-gateway-table
    [gateways]="gateways()"
    [isLoading]="isLoading()"
  ></app-admin-gateway-table>
  <app-admin-gateway-form
    [isSaving]="isSaving()"
    (createRequested)="onCreateGateway($event)"
  ></app-admin-gateway-form>
</section>
