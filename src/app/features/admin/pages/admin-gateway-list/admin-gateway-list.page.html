<section class="admin-gateway-list">
  <div class="header-row">
    <h2>Admin Gateway</h2>
    @if (!showCreateForm()) {
      <button type="button" class="create-toggle" (click)="toggleCreateForm()">
        + New gateway
      </button>
    }
  </div>

  <form class="filter-row" (submit)="onApplyFilter($event, tenantFilterInput.value)">
    <label>
      Tenant ID filter
      <input #tenantFilterInput type="text" [value]="tenantFilter()" placeholder="tenant_123" />
    </label>
    <div class="actions">
      <button type="submit">Apply</button>
      <button type="button" class="ghost" (click)="onResetFilter()">Reset</button>
    </div>
  </form>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (infoMessage()) {
    <p class="info">{{ infoMessage() }}</p>
  }

  <app-admin-gateway-table
    [gateways]="gateways()"
    [isLoading]="isLoading()"
  ></app-admin-gateway-table>

  @if (showCreateForm()) {
    <app-modal-layer [open]="true">
      <app-admin-gateway-form
        [isSaving]="isSaving()"
        [tenantIds]="tenantOptions()"
        (createRequested)="onCreateGateway($event)"
        (cancelRequested)="onCreateCancelled()"
      ></app-admin-gateway-form>
    </app-modal-layer>
  }
</section>
