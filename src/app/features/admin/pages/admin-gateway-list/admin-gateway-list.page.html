<section class="admin-gateway-list">
  <div class="header-row">
    <h2>Admin Gateway</h2>
    @if (!showCreateForm()) {
      <button type="button" class="create-toggle" (click)="toggleCreateForm()">
        + New gateway
      </button>
    }
  </div>

  <form class="filter-row" (submit)="onApplyFilter($event)">
    <div class="filter-control">
      <span>Tenant ID filter</span>
      <app-multi-select-dropdown
        [options]="tenantOptions()"
        [selected]="draftTenantIds()"
        [placeholder]="'Select tenant'"
        [searchPlaceholder]="'Search tenant...'"
        [disabled]="isLoading()"
        (selectedChange)="onTenantFilterSelectionChanged($event)"
      ></app-multi-select-dropdown>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="isLoading()">Apply</button>
      <button type="button" class="ghost" (click)="onResetFilter()" [disabled]="isLoading()">
        Reset
      </button>
    </div>
  </form>

  @if (!showCreateForm() && errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (infoMessage()) {
    <p class="info">{{ infoMessage() }}</p>
  }

  <app-admin-gateway-table
    [gateways]="filteredGateways()"
    [isLoading]="isLoading()"
  ></app-admin-gateway-table>

  @if (showCreateForm()) {
    <app-modal-layer [open]="true">
      <app-admin-gateway-form
        [isSaving]="isSaving()"
        [tenantIds]="tenantOptions()"
        [errorMessage]="formErrorMessage()"
        (createRequested)="onCreateGateway($event)"
        (cancelRequested)="onCreateCancelled()"
      ></app-admin-gateway-form>
    </app-modal-layer>
  }
</section>
