<section class="admin-gateway-form">
  <h3>Add gateway</h3>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  <form (submit)="onSubmit($event, factoryId.value, tenantId.value, factoryKey.value, model.value)">
    <label>
      Factory ID
      <input #factoryId type="text" required minlength="3" />
    </label>

    <label>
      Tenant ID
      <select #tenantId required [disabled]="tenantIds().length === 0">
        <option value="">Select tenant</option>
        @for (tenantIdOption of tenantIds(); track tenantIdOption) {
          <option [value]="tenantIdOption">{{ tenantIdOption }}</option>
        }
      </select>
    </label>

    <label>
      Factory Key
      <input #factoryKey type="text" required minlength="32" />
    </label>

    <label>
      Model
      <input #model type="text" required minlength="2" />
    </label>

    <div class="actions">
      <button type="submit" [disabled]="isSaving()">Add</button>
      <button type="button" class="ghost" (click)="onCancel()" [disabled]="isSaving()">
        Cancel
      </button>
    </div>
  </form>
</section>
