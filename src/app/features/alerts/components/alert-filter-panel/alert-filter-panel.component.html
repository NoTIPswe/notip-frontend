<section class="alert-filter-panel">
  <h3>Alert Filters</h3>

  <form (submit)="submit($event, fromInput.value, toInput.value)">
    <label>
      From
      <input #fromInput type="datetime-local" [value]="from()" />
    </label>

    <label>
      To
      <input #toInput type="datetime-local" [value]="to()" />
    </label>

    <div class="field">
      <span>Gateway ID</span>
      <app-multi-select-dropdown
        [options]="gatewayOptions()"
        [selected]="selectedGatewayIds()"
        [placeholder]="'Select gateway'"
        [searchPlaceholder]="'Search gateway...'"
        [disabled]="isLoading()"
        (selectedChange)="onGatewaySelectionChanged($event)"
      ></app-multi-select-dropdown>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="isLoading()">Apply</button>
      <button type="button" class="ghost" (click)="reset()" [disabled]="isLoading()">Reset</button>
    </div>
  </form>
</section>
