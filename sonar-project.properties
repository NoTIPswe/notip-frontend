sonar.projectKey=NoTIPswe_notip-frontend
sonar.organization=notipswe

sonar.sources=src
sonar.exclusions=**/*.spec.ts, src/environments/**, src/app/generated/**

sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.coverage.exclusions=\
	src/app/app.config.ts,\
	src/app/app.routes.ts,\
	src/app/core/auth/contracts.ts,\
	src/app/core/models/**/*.ts,\
	src/main.ts,\
	src/test-setup.ts,\
	src/app/**/pages/**/*.page.ts,\
	src/app/features/admin/components/admin-gateway-table/admin-gateway-table.component.ts,\
	src/app/features/admin/components/tenant-table/tenant-table.component.ts,\
	src/app/features/admin/components/tenant-user-list/tenant-user-list.component.ts,\
	src/app/features/mgmt/audit/components/audit-filter-panel/audit-filter-panel.component.ts,\
	src/app/features/mgmt/audit/components/audit-log-table/audit-log-table.component.ts,\
	src/app/features/mgmt/costs/components/cost-card/cost-card.component.ts,\
	src/app/shared/components/impersonation-banner/impersonation-banner.component.ts,\
	src/app/shared/components/impersonation-tag/impersonation-tag.component.ts,\
	src/app/shared/components/placeholder-page/placeholder-page.component.ts,\
	src/app/shared/components/profile-section/profile-section.component.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/test-reporter.xml
sonar.eslint.reportPaths=eslint-report.json
sonar.typescript.tsconfigPath=tsconfig.json